<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>AI Transport</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background: #0f172a;
            color: #e2e8f0;
        }

        /* 🔷 Navbar */
        .navbar {
            background: #1e293b;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .navbar h1 {
            font-size: 20px;
            color: #38bdf8;
        }

        .nav-links a {
            margin-left: 15px;
            text-decoration: none;
            color: #cbd5f5;
            padding: 8px 14px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .nav-links a:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        /* 🔷 Container */
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }

        /* 🔷 Card */
        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 20px;
            color: #38bdf8;
        }

        /* 🔷 Buttons */
        button, .btn {
            background: #38bdf8;
            border: none;
            padding: 10px 18px;
            border-radius: 10px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover, .btn:hover {
            background: #0ea5e9;
        }

        /* 🔷 Inputs */
        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #0f172a;
            color: #fff;
        }

        /* 🔷 List */
        ul {
            list-style: none;
        }

        li {
            background: #0f172a;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        a.link {
            color: #38bdf8;
            text-decoration: none;
        }

        a.link:hover {
            text-decoration: underline;
        }

        /* 🔷 Image */
        img {
            border-radius: 12px;
            margin-top: 15px;
        }

        /* 🔷 Badge */
        .badge {
            background: #22c55e;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 12px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>🚗 AI Transport</h1>
    <div class="nav-links">
        <a href="/">Главная</a>
        <a href="/upload/">Загрузить</a>
        <a href="/users/logout/">Выйти</a>
    </div>
</div>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
