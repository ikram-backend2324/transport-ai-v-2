    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg:#070a12; --surface:#0d1220; --surface2:#121929; --surface3:#1a2438;
            --border:rgba(255,255,255,0.06); --border-strong:rgba(255,255,255,0.10);
            --border-glow:rgba(0,210,255,0.35);
            --accent:#00d2ff; --accent2:#0099cc; --accent3:#00ffb3; --accent4:#a855f7;
            --text:#e8f0f8; --muted:#6b7d94; --muted2:#3d4f66;
            --success:#00ffb3; --warning:#ffc93c; --danger:#ff4d6d;
            --radius:16px; --radius-sm:10px;
            --font-d:'Rajdhani',sans-serif; --font-b:'DM Sans',sans-serif; --font-m:'JetBrains Mono',monospace;
        }
        html { scroll-behavior:smooth; }
        body { background:var(--bg); color:var(--text); font-family:var(--font-b); font-size:15px; line-height:1.6; min-height:100vh; overflow-x:hidden; }

        /* ── Background ── */
        .bg-layer { position:fixed; inset:0; pointer-events:none; z-index:0; }
        .bg-grid { background-image:linear-gradient(rgba(0,210,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,0.025) 1px,transparent 1px); background-size:48px 48px; }
        .bg-g1 { background:radial-gradient(ellipse 700px 500px at 90% -10%,rgba(0,153,204,0.12) 0%,transparent 70%); animation:gd1 18s ease-in-out infinite alternate; }
        .bg-g2 { background:radial-gradient(ellipse 500px 400px at -10% 80%,rgba(0,255,179,0.06) 0%,transparent 60%); animation:gd2 24s ease-in-out infinite alternate; }
        .bg-g3 { background:radial-gradient(ellipse 400px 300px at 50% 50%,rgba(168,85,247,0.04) 0%,transparent 60%); animation:gd1 32s ease-in-out infinite alternate-reverse; }
        .bg-scan { background:linear-gradient(transparent 0%,rgba(0,210,255,0.012) 50%,transparent 100%); background-size:100% 200px; animation:scan 10s linear infinite; }
        @keyframes gd1 { from{transform:translate(0,0)} to{transform:translate(-80px,60px)} }
        @keyframes gd2 { from{transform:translate(0,0)} to{transform:translate(60px,-40px)} }
        @keyframes scan { from{background-position:0 -200px} to{background-position:0 110vh} }

        /* ── Navbar ── */
        .navbar {
            position:sticky; top:0; z-index:200;
            background:rgba(7,10,18,0.92); backdrop-filter:blur(20px) saturate(180%); -webkit-backdrop-filter:blur(20px) saturate(180%);
            border-bottom:1px solid var(--border);
            padding:0 28px; height:60px;
            display:flex; align-items:center; justify-content:space-between;
        }
        .navbar::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(0,210,255,0.25),transparent); }
        .navbar-brand { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); z-index:1; }
        .brand-icon { width:34px; height:34px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; box-shadow:0 0 16px rgba(0,210,255,0.3); flex-shrink:0; position:relative; overflow:hidden; }
        .brand-icon::after { content:''; position:absolute; inset:0; background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,0.4) 50%,transparent 70%); animation:brand-shimmer 4s ease-in-out infinite; }
        @keyframes brand-shimmer { 0%,90%,100% { transform:translateX(-100%); } 50% { transform:translateX(100%); } }
        .brand-name { font-family:var(--font-d); font-size:19px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; }
        .brand-name span { color:var(--accent); }

        /* Desktop nav links */
        .nav-links { display:flex; align-items:center; gap:4px; }
        .nav-links a { text-decoration:none; color:var(--muted); padding:7px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:500; transition:all 0.2s; border:1px solid transparent; white-space:nowrap; }
        .nav-links a:hover { color:var(--text); background:var(--surface2); border-color:var(--border); }
        .nav-links a.btn-nav { color:var(--accent); border-color:rgba(0,210,255,0.3); background:rgba(0,210,255,0.05); font-family:var(--font-d); font-weight:600; letter-spacing:0.05em; text-transform:uppercase; font-size:12px; }
        .nav-links a.btn-nav:hover { background:rgba(0,210,255,0.12); border-color:var(--accent); }
        .lang-switcher { display:flex; align-items:center; gap:2px; background:var(--surface2); border:1px solid var(--border); border-radius:24px; padding:3px; margin-left:8px; }
        .lang-btn { background:none; border:none; color:var(--muted); font-size:11px; font-weight:700; padding:4px 9px; border-radius:20px; cursor:pointer; transition:all 0.2s; letter-spacing:0.06em; font-family:var(--font-d); }
        .lang-btn:hover { color:var(--text); }
        .lang-btn.active { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:var(--bg); }

        /* Hamburger button */
        .nav-toggle { display:none; flex-direction:column; justify-content:center; gap:5px; width:36px; height:36px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; cursor:pointer; padding:8px; z-index:201; flex-shrink:0; }
        .nav-toggle span { display:block; height:2px; background:var(--text); border-radius:2px; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); }
        .nav-toggle.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
        .nav-toggle.open span:nth-child(2) { opacity:0; transform:scaleX(0); }
        .nav-toggle.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

        /* Mobile nav drawer */
        @media(max-width:760px) {
            .navbar { padding:0 16px; }
            .nav-toggle { display:flex; }
            .nav-links {
                display:none; flex-direction:column; align-items:stretch; gap:6px;
                position:fixed; top:60px; left:0; right:0;
                background:rgba(7,10,18,0.97); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
                border-bottom:1px solid var(--border);
                padding:16px; z-index:199;
                animation:drawer-in 0.25s cubic-bezier(0.16,1,0.3,1);
                max-height:calc(100vh - 60px); overflow-y:auto;
            }
            .nav-links.open { display:flex; }
            @keyframes drawer-in { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
            .nav-links a { padding:12px 16px; font-size:14px; border:1px solid var(--border); }
            .nav-links a.btn-nav { text-align:center; justify-content:center; }
            .lang-switcher { margin:4px 0 0; justify-content:center; }
        }

        /* ── Layout ── */
        .container { position:relative; z-index:1; max-width:1180px; margin:32px auto; padding:0 20px; animation:page-in 0.6s cubic-bezier(0.16,1,0.3,1) both; }
        .container.narrow { max-width:920px; }
        @media(max-width:640px) { .container { margin:20px auto; padding:0 14px; } }
        @keyframes page-in { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        /* ── Cards ── */
        .card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; margin-bottom:16px; position:relative; overflow:hidden; animation:card-in 0.5s cubic-bezier(0.16,1,0.3,1) both; }
        .card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(0,210,255,0.2),transparent); }
        .card:nth-child(2){animation-delay:0.08s} .card:nth-child(3){animation-delay:0.16s}
        @keyframes card-in { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
        @media(max-width:640px) { .card { padding:18px; border-radius:12px; } }

        /* ── Typography ── */
        h1 { font-family:var(--font-d); font-size:48px; font-weight:700; line-height:1.05; letter-spacing:-0.01em; }
        h1 .accent { background:linear-gradient(135deg,var(--accent),var(--accent3)); -webkit-background-clip:text; background-clip:text; color:transparent; }
        h2 { font-family:var(--font-d); font-size:22px; font-weight:700; color:var(--text); margin-bottom:20px; letter-spacing:0.03em; text-transform:uppercase; }
        h2 .accent { color:var(--accent); }
        h3 { font-family:var(--font-d); font-size:16px; font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--text); }
        @media(max-width:760px) { h1 { font-size:34px; } h2 { font-size:18px; margin-bottom:16px; } }
        @media(max-width:420px) { h1 { font-size:28px; } }

        /* ── Buttons ── */
        .btn { display:inline-flex; align-items:center; gap:7px; padding:11px 22px; border-radius:var(--radius-sm); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.25s; text-decoration:none; border:none; font-family:var(--font-d); letter-spacing:0.06em; text-transform:uppercase; position:relative; overflow:hidden; }
        .btn::before { content:''; position:absolute; top:0; left:-100%; width:60%; height:100%; background:linear-gradient(120deg,transparent,rgba(255,255,255,0.15),transparent); transition:left 0.4s; }
        .btn:hover::before { left:140%; }
        .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:var(--bg); box-shadow:0 4px 20px rgba(0,210,255,0.25); }
        .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(0,210,255,0.4); }
        .btn-primary:active { transform:translateY(0); }
        .btn-outline { background:transparent; color:var(--accent); border:1px solid rgba(0,210,255,0.35); }
        .btn-outline:hover { background:rgba(0,210,255,0.08); border-color:var(--accent); }
        .btn-ghost { background:var(--surface2); color:var(--text); border:1px solid var(--border); }
        .btn-ghost:hover { border-color:var(--border-strong); background:var(--surface3); }
        @media(max-width:640px) { .btn { padding:10px 16px; font-size:12px; } }

        /* ── Forms ── */
        input[type="text"],input[type="password"],input[type="email"],input[type="number"],select,textarea {
            width:100%; padding:11px 14px; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); color:var(--text); font-size:14px; font-family:var(--font-b); outline:none; transition:all 0.2s;
        }
        textarea { resize:vertical; min-height:80px; font-family:var(--font-b); }
        input:focus,select:focus,textarea:focus { border-color:var(--accent); background:rgba(0,210,255,0.04); box-shadow:0 0 0 3px rgba(0,210,255,0.08); }
        label { display:block; font-size:11px; color:var(--muted); margin-bottom:6px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; font-family:var(--font-d); }

        ul { list-style:none; }
        a.link { color:var(--accent); text-decoration:none; font-size:13px; font-weight:500; }
        a.link:hover { text-decoration:underline; }
        img { border-radius:var(--radius-sm); }
        .badge { display:inline-flex; align-items:center; background:rgba(0,255,179,0.1); color:var(--success); padding:3px 12px; border-radius:20px; font-size:12px; font-weight:500; border:1px solid rgba(0,255,179,0.2); }
        ::-webkit-scrollbar{width:5px;background:var(--bg)} ::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

        .vis-canvas-wrap { position:relative; width:100%; aspect-ratio:16/10; border-radius:var(--radius); overflow:hidden; background:radial-gradient(ellipse at center, rgba(0,210,255,0.07), transparent 70%), var(--surface2); border:1px solid var(--border); }
        .vis-canvas-wrap canvas { display:block; width:100% !important; height:100% !important; }
        @media(max-width:640px) { .vis-canvas-wrap { aspect-ratio:4/3; } }

        .chip { display:inline-flex; align-items:center; gap:6px; background:var(--surface2); border:1px solid var(--border); padding:5px 12px; border-radius:20px; font-size:11px; color:var(--muted); font-family:var(--font-d); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; }
        .chip .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 6px var(--accent); animation:dot-pulse 1.6s ease-in-out infinite; }
        @keyframes dot-pulse { 0%,100%{opacity:1; transform:scale(1)} 50%{opacity:0.5; transform:scale(0.85)} }
    </style>

    function applyLang(lang){
      var t = TRANSLATIONS[lang] || TRANSLATIONS['ru'];
      document.querySelectorAll('[data-i18n]').forEach(function(el){
        var key = el.getAttribute('data-i18n');
        if(t[key] === undefined) return;
        if(el.children.length === 0){
          el.textContent = t[key];
        } else {
          Array.from(el.childNodes).forEach(function(node){
            if(node.nodeType === 3 && node.textContent.trim()){
              node.textContent = ' ' + t[key] + ' ';
            }
          });
        }
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){
        var key = el.getAttribute('data-i18n-placeholder');
        if(t[key] !== undefined) el.setAttribute('placeholder', t[key]);
      });
      var lm = {
        'id_username':'label_username','id_password':'label_password',
        'id_password1':'label_password1','id_password2':'label_password2',
        'id_vehicle':'vehicle_source_label','id_image':'upload_drag',
        'id_brand':'label_brand','id_model_name':'label_model','id_year':'label_year',
        'id_color':'label_color','id_mileage':'label_mileage','id_fuel_type':'label_fuel',
        'id_transmission':'label_transmission','id_additional_info':'label_extra',
        'id_custom_vehicle':'vehicle_source_label'
      };
      document.querySelectorAll('label[for]').forEach(function(lb){
        var k = lm[lb.getAttribute('for')];
        if(k && t[k]) lb.textContent = t[k];
      });
      document.querySelectorAll('.lang-btn').forEach(function(b){
        b.classList.toggle('active', b.getAttribute('data-lang') === lang);
      });
      document.documentElement.lang = lang;
      document.querySelectorAll('input[name="language"]').forEach(function(inp){ inp.value = lang; });
      document.dispatchEvent(new CustomEvent('langchanged',{ detail:{ lang:lang }}));
    }
    function setLang(lang){ setCookie('lang', lang, 365); applyLang(lang); }

    document.addEventListener('DOMContentLoaded', function(){
      applyLang(getCookie('lang') || 'ru');
      var toggle = document.getElementById('navToggle');
      var links  = document.getElementById('navLinks');
      if(toggle && links){
        toggle.addEventListener('click', function(){
          toggle.classList.toggle('open');
          links.classList.toggle('open');
        });
        links.querySelectorAll('a').forEach(function(a){
          a.addEventListener('click', function(){ toggle.classList.remove('open'); links.classList.remove('open'); });
        });
      }
    });
    </script>
