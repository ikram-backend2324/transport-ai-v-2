{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width:440px;margin:0 auto;">
    <h2 data-i18n="login_title">Вход</h2>

    <form method="post">
        {% csrf_token %}
        {% for field in form %}
        <div style="margin-bottom:16px;">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                {% for error in field.errors %}
                    <div style="color:#ef4444;font-size:12px;margin-top:4px;">{{ error }}</div>
                {% endfor %}
            {% endif %}
        </div>
        {% endfor %}
        <button class="modern-btn" type="submit" data-i18n="login_btn">Войти</button>
    </form>

    <p style="margin-top:16px;font-size:13px;color:var(--muted);">
        <span data-i18n="login_no_account">Нет аккаунта?</span>
        <a class="link" href="/users/register/" data-i18n="login_register">Регистрация</a>
    </p>
</div>
{% endblock %}
