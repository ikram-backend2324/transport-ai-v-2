{% extends 'base.html' %}

{% block content %}
<style>
    .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }

    @media (max-width: 640px) {
        .result-grid { grid-template-columns: 1fr; }
    }

    .img-card {
        border-radius: var(--radius);
        overflow: hidden;
        border: 1px solid var(--border);
        position: relative;
    }

    .img-card img {
        width: 100%;
        height: 260px;
        object-fit: cover;
        display: block;
        border-radius: 0;
        transition: transform 0.4s ease;
    }

    .img-card:hover img { transform: scale(1.02); }

    .img-overlay {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 20px 16px 14px;
        background: linear-gradient(transparent, rgba(11,17,32,0.9));
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .conf-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
        border: 1px solid;
    }

    .conf-low { background: rgba(239,68,68,0.15); color: #ef4444; border-color: rgba(239,68,68,0.3); }
    .conf-mid { background: rgba(245,158,11,0.15); color: #f59e0b; border-color: rgba(245,158,11,0.3); }
    .conf-high { background: rgba(34,197,94,0.15); color: #22c55e; border-color: rgba(34,197,94,0.3); }

    .analysis-card {
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .analysis-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
    }

    .analysis-icon {
        width: 36px;
        height: 36px;
        background: rgba(56,189,248,0.12);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
    }

    .analysis-text {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
        flex: 1;
    }

    /* confidence bar */
    .conf-section {
        margin-top: auto;
        padding-top: 18px;
        border-top: 1px solid var(--border);
    }

    .conf-label {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 8px;
    }

    .conf-track {
        background: var(--bg);
        border-radius: 6px;
        height: 8px;
        overflow: hidden;
        border: 1px solid var(--border);
    }

    .conf-bar {
        height: 100%;
        border-radius: 6px;
        width: 0%;
        transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .conf-bar.low { background: linear-gradient(90deg, #ef4444, #f97316); }
    .conf-bar.mid { background: linear-gradient(90deg, #f59e0b, #eab308); }
    .conf-bar.high { background: linear-gradient(90deg, #22c55e, #38bdf8); }

    /* meta row */
    .meta-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
    }

    .meta-chip {
        display: flex;
        align-items: center;
        gap: 6px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 5px 12px;
        font-size: 12px;
        color: var(--muted);
    }

    .meta-chip .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
    }

    /* enter animation */
    .card, .img-card {
        animation: card-in 0.45s ease both;
    }

    .card:nth-child(2) { animation-delay: 0.1s; }
</style>

<div style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
    <h2 style="margin: 0;">Результат <span class="accent">анализа</span></h2>
    <a href="/" class="btn btn-outline">← Назад</a>
</div>

<div class="result-grid">
    <!-- Image -->
    <div class="img-card">
        <img src="{{ inspection.image.url }}" alt="Фото транспорта">
        <div class="img-overlay">
            <span id="confBadge" class="conf-badge">—</span>
            <span style="color: var(--muted); font-size: 12px;">уверенность AI</span>
        </div>
    </div>

    <!-- Analysis -->
    <div class="card analysis-card" style="margin-bottom: 0;">
        <div class="analysis-header">
            <div class="analysis-icon">🤖</div>
            <div>
                <div style="font-weight: 600; font-size: 15px;">AI-диагностика</div>
                <div style="font-size: 12px; color: var(--muted);">Claude Vision</div>
            </div>
        </div>

        <div class="analysis-text" id="analysisText" data-raw="{{ inspection.result|escapejs }}"></div>

        <div class="conf-section">
            <div class="conf-label">
                <span>Уверенность модели</span>
                <span id="confPercent">{{ inspection.confidence }}%</span>
            </div>
            <div class="conf-track">
                <div class="conf-bar" id="confBar"></div>
            </div>
        </div>
    </div>
</div>

<!-- Meta -->
<div class="card" style="padding: 18px 24px;">
    <div class="meta-row">
        <div class="meta-chip">
            <div class="dot"></div>
            {{ inspection.vehicle.name }}
        </div>
        <div class="meta-chip">
            <div class="dot"></div>
            {{ inspection.created_at|date:"d.m.Y H:i" }}
        </div>
        <div class="meta-chip">
            <div class="dot" style="background: var(--success);"></div>
            Анализ завершён
        </div>
    </div>
</div>

<a href="/upload/" class="btn btn-primary" style="margin-top: 8px;">
    + Новая проверка
</a>

<script>
const confidence = {{ inspection.confidence }};
const confBar = document.getElementById('confBar');
const confBadge = document.getElementById('confBadge');

setTimeout(() => {
    confBar.style.width = confidence + '%';

    if (confidence < 40) {
        confBar.className = 'conf-bar low';
        confBadge.className = 'conf-badge conf-low';
        confBadge.textContent = confidence + '% — низкая';
    } else if (confidence < 70) {
        confBar.className = 'conf-bar mid';
        confBadge.className = 'conf-badge conf-mid';
        confBadge.textContent = confidence + '% — средняя';
    } else {
        confBar.className = 'conf-bar high';
        confBadge.className = 'conf-badge conf-high';
        confBadge.textContent = confidence + '% — высокая';
    }
}, 300);

// Format AI markdown response
(function() {
    const el = document.getElementById('analysisText');
    if (!el) return;
    const raw = el.getAttribute('data-raw') || '';
    const html = raw.split('\n').map(line => {
        line = line.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text);font-weight:600;">$1</strong>');
        if (!line.trim()) return '';
        return '<p style="margin:0 0 10px 0;line-height:1.65;">' + line + '</p>';
    }).filter(x => x).join('');
    el.innerHTML = html;
})();
</script>
{% endblock %}
